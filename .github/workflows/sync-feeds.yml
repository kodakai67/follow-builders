name: Sync Feeds from Upstream

# Keeps this fork's feed files fresh by copying them daily from the upstream
# repo, which runs the full content pipeline (X API + podcast transcription).
# Needs no secrets — only the default GITHUB_TOKEN.
#
# Runs after upstream's generate-feed workflow (daily at 6:17 UTC, usually
# finished by ~7:30 UTC). Can also be triggered manually from the Actions tab.

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download latest feeds from upstream
        run: |
          for f in feed-x.json feed-podcasts.json feed-blogs.json state-feed.json; do
            curl -fsSL --retry 3 --retry-delay 5 \
              "https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/$f" \
              -o "$f"
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-blogs.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: sync feeds from upstream [skip ci]"
          git push
